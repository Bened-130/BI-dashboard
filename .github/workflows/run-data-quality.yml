name: Run Data Quality Checks

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM
  workflow_dispatch:
    inputs:
      layer:
        description: 'Data layer to validate'
        required: true
        default: 'silver'
        type: choice
        options:
          - bronze
          - silver
          - gold

jobs:
  data-quality:
