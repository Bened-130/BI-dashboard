name: Synapse ETL CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'synapse/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black
      
      - name: Lint with flake8
        run: |
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Check formatting with black
        run: |
          black --check src || true
      
      - name: Run unit tests
        run: |
          pytest tests/unit -v || echo "No tests found"

  validate-synapse:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate JSON schemas
        run: |
          find synapse -name "*.json" -exec python -m json.tool {} \; > /dev/null && echo "JSON validation passed"
      
      - name: Check Python syntax
        run: |
          python -m py_compile src/etl_framework/config/settings.py
          python -m py_compile src/etl_framework/connectors/delta_lake_manager.py
          python -m py_compile src/etl_framework/core/extractors.py
          python -m py_compile src/etl_framework/transformations/product_transforms.py
          python -m py_compile src/etl_framework/quality/great_expectations_suites.py

  deploy-synapse:
    runs-on: windows-latest
    needs: [test, validate-synapse]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Synapse
        run: |
          echo "Deploying Synapse artifacts..."
          # Add Synapse deployment commands here
          # Use Synapse REST API or Azure CLI extensions

  trigger-etl:
    runs-on: windows-latest
    needs: deploy-synapse
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Master Pipeline
        run: |
          echo "Triggering ETL pipeline..."
