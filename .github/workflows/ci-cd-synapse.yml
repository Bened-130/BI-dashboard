name: Synapse ETL CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'synapse/**'
      - 'infrastructure/**'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pyspark==3.4.1
      
      - name: Run unit tests
        run: |
          pytest tests/unit --cov=src --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  validate-synapse:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Synapse artifacts
        run: |
          # Validate JSON schemas
          find synapse/pipelines -name "*.json" -exec python -m json.tool {} \; > /dev/null
          find synapse/notebooks -name "*.ipynb" -exec python -c "import json; json.load(open('{}'))" \;
      
      - name: Check notebook dependencies
        run: |
          python scripts/validate_notebook_imports.py

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: [test, validate-synapse]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy Bicep
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION }}
          resourceGroupName: ${{ secrets.RESOURCE_GROUP }}
          template: ./infrastructure/main.bicep
          parameters: |
            {
              "environment": "prod",
              "projectName": "synapseetl"
            }
          failOnStdErr: false

  deploy-synapse:
    runs-on: windows-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Synapse PowerShell Module
        run: |
          Install-Module -Name Az.Synapse -Force -AllowClobber
      
      - name: Deploy Notebooks
        shell: pwsh
        run: |
          $workspaceName = "${{ secrets.SYNAPSE_WORKSPACE_NAME }}"
          
          # Deploy notebooks
          Get-ChildItem -Path "./synapse/notebooks" -Recurse -Filter "*.ipynb" | ForEach-Object {
              $notebookPath = $_.FullName
              $notebookName = $_.BaseName
              
              Write-Host "Deploying notebook: $notebookName"
              Set-AzSynapseNotebook -WorkspaceName $workspaceName -Name $notebookName -DefinitionFile $notebookPath
          }
      
      - name: Deploy Pipelines
        shell: pwsh
        run: |
          # Deploy pipelines
          Get-ChildItem -Path "./synapse/pipelines" -Filter "*.json" | ForEach-Object {
              $pipelinePath = $_.FullName
              $pipelineName = [System.IO.Path]::GetFileNameWithoutExtension($_.Name)
              
              Set-AzSynapsePipeline -WorkspaceName $workspaceName -Name $pipelineName -DefinitionFile $pipelinePath
          }

  trigger-etl:
    runs-on: ubuntu-latest
    needs: deploy-synapse
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Master Pipeline
        run: |
          curl -X POST \
            https://${{ secrets.SYNAPSE_WORKSPACE_NAME }}.dev.azuresynapse.net/pipelines/pl_master_etl/createRun?api-version=2020-12-01 \
            -H "Authorization: Bearer ${{ secrets.SYNAPSE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "parameters": {
                "trigger_date": "${{ github.event.head_commit.timestamp }}"
              }
            }'